<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to En-boarding</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://www.en-boarding.com/en_index">
  <!-- Automatic redirect after 0 seconds -->
  <meta http-equiv="refresh" content="0; url=/en_index">
  <style>
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .redirect-box {
      text-align: center;
      background: white;
      padding: 2rem;
      border-radius: 28px;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
      max-width: 480px;
    }
    p { margin: 1rem 0; color: #2c3e2f; }
    a { color: #2b6e6e; text-decoration: none; border-bottom: 1px solid #a0c4c4; }
    a:hover { color: #1e4f4f; }
  </style>
  <script>
    // JavaScript fallback redirect (in case meta refresh fails)
    window.location.replace("/en_index");
  </script>
</head>
<body>
  <div class="redirect-box">
    <p>Redirecting you to <strong>En-boarding</strong>…</p>
    <p>If nothing happens, <a href="/en_index">click here</a>.</p>
  </div>
</body>
</html>
