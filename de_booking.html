<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En-boarding · Buchen</title>
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <div id="lang-bar"></div>
  <header class="header">
    <div class="header-inner" id="global-header"></div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width:820px;">
        <div class="section-title">
          <div class="kicker">Kostenlose erste Session</div>
          <h1 style="font-size:clamp(2.2rem,4vw,3.3rem);">Buchen Sie Ihre erste Session</h1>
          <p>Beginnen Sie mit einem fokussierten Gespräch, um Ihre Situation, Prioritäten und nächsten Schritte zu klären.</p>
        </div>
        <div class="form-card">
          <div class="form-group">
            <label for="name">Vollständiger Name *</label>
            <input id="name" type="text">
          </div>
          <div class="form-group">
            <label for="email">E-Mail-Adresse *</label>
            <input id="email" type="email">
          </div>
          <div class="form-group">
            <label for="message">Was ist Ihre größte Herausforderung im Moment? (optional)</label>
            <textarea id="message" placeholder="z.B. Ich weiß nicht, wie ich meine Idee validieren soll, ich stecke zwischen zwei Richtungen fest, ich brauche einen Fahrplan..."></textarea>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="consent">
            <label for="consent">Ich stimme der <a href="de_privacy">Datenschutzerklärung</a> zu und bin mit der Kontaktaufnahme für diese Session einverstanden.</label>
          </div>
          <a href="mailto:enboarding@gmail.com" class="btn btn-primary" style="width:100%;">Kostenlose Session anfragen →</a>
          <p class="note">Nach dem Absenden können Sie das Gespräch unter enboarding@gmail.com fortsetzen.</p>
        </div>
      </div>
    </section>
  </main>

  <footer><div class="footer-inner" id="global-footer"></div></footer>
  <div id="cookie-consent"></div>
  <script src="js/components.js"></script>
</body>
</html>
