<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/global.css">
</head>
<body>
  <div id="lang-bar"></div>
  <header class="header">
    <div class="header-inner" id="global-header"></div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width:820px;">
        <div class="section-title">
          <div class="kicker">Free first session</div>
          <h1 style="font-size:clamp(2.2rem,4vw,3.3rem);">Book your first session</h1>
          <p>Start with a focused conversation to clarify your situation, priorities, and next steps.</p>
        </div>
        <div class="form-card">
          <div class="form-group">
            <label for="name">Full name *</label>
            <input id="name" type="text">
          </div>
          <div class="form-group">
            <label for="email">Email address *</label>
            <input id="email" type="email">
          </div>
          <div class="form-group">
            <label for="message">What is your biggest challenge right now? (optional)</label>
            <textarea id="message" placeholder="e.g. I don't know how to validate my idea, I'm stuck between two directions, I need a roadmap..."></textarea>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="consent">
            <label for="consent">I agree to the <a href="en_privacy">Privacy Policy</a> and consent to being contacted about this session.</label>
          </div>
          <a href="mailto:enboarding@gmail.com" class="btn btn-primary" style="width:100%;">Request my free session →</a>
          <p class="note">After submitting, you can continue the conversation at enboarding@gmail.com.</p>
        </div>
      </div>
    </section>
  </main>

  <footer><div class="footer-inner" id="global-footer"></div></footer>
  <div id="cookie-consent"></div>

  <script src="js/components.js"></script>
</body>
</html>
