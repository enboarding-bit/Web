<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>احجز جلستك المجانية للوضوح | en-boarding</title>
  <meta name="description" content="احجز جلسة وضوح مجانية لمدة 30 دقيقة. احصل على توجيه لتحويل فكرتك أو مهاراتك أو مشروعك إلى دخل. بدون التزام.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .form-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 40px;
      box-shadow: var(--shadow);
    }
    .form-group { margin-bottom: 28px; text-align: right; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--ink); }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      background: var(--surface-soft);
      text-align: right;
    }
    .form-group input:focus,
    .form-group textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .checkbox-group { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 32px; flex-direction: row-reverse; }
    .checkbox-group input { margin-top: 4px; width: 18px; height: 18px; accent-color: var(--ink); }
    .checkbox-group label { font-size: 0.95rem; color: var(--muted); line-height: 1.5; text-align: right; }
    .checkbox-group a { color: var(--ink); text-decoration: underline; }
    .note { text-align: center; margin-top: 20px; color: var(--muted); font-size: 0.9rem; }
    .booking-submit { width: 100%; text-align: center; justify-content: center; display: inline-flex; align-items: center; border: none; cursor: pointer; }
    .success-message {
      display: none; margin-top: 20px; padding: 16px 18px; border-radius: 16px;
      background: #f4f8f4; border: 1px solid #cfe3cf; color: #234223; text-align: center; font-weight: 600;
    }
    .error-message {
      display: none; margin-top: 20px; padding: 16px 18px; border-radius: 16px;
      background: #fff4f4; border: 1px solid #e7caca; color: #7a1f1f; text-align: center; font-weight: 600;
    }
    @media (max-width: 640px) { .form-card { padding: 28px 22px; } }
  </style>
</head>
<body>
  <div id="lang-bar" style="display:none;"></div>
  <header class="header">
    <div class="header-inner" id="global-header"></div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width:820px;">
        <div class="section-title">
          <div class="kicker">جلسة أولى مجانية</div>
          <h1 style="font-size:clamp(2.2rem,4vw,3.3rem);">احجز جلستك الأولى</h1>
          <p>ابدأ بمحادثة مركزة لتوضيح وضعك وأولوياتك وخطواتك التالية.</p>
        </div>

        <div class="form-card">
          <form id="booking-form" action="https://formspree.io/f/xnjlgwva" method="POST">
            <div class="form-group">
              <label for="name">الاسم الكامل *</label>
              <input id="name" name="name" type="text" placeholder="اسمك الكامل" required>
            </div>

            <div class="form-group">
              <label for="email">البريد الإلكتروني *</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
              <label for="message">ما هو أكبر تحدٍ تواجهه الآن؟ (اختياري)</label>
              <textarea id="message" name="message" placeholder="مثال: لا أعرف كيف أتحقق من فكرتي، أنا عالق بين اتجاهين، أحتاج إلى خارطة طريق..."></textarea>
            </div>

            <div class="checkbox-group">
              <input type="checkbox" id="consent" name="consent" required>
              <label for="consent">أوافق على <a href="ar_privacy.html">سياسة الخصوصية</a> وأوافق على أن يتم التواصل معي بخصوص هذه الجلسة.</label>
            </div>

            <button type="submit" class="btn btn-primary booking-submit">اطلب جلستي المجانية ←</button>

            <p class="note">سنعود إليك قريبًا.</p>
            <div id="success-message" class="success-message">شكرًا لك. تم إرسال طلبك بنجاح.</div>
            <div id="error-message" class="error-message">عذرًا، حدث خطأ ما. يرجى المحاولة مرة أخرى.</div>
          </form>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner" id="global-footer"></div>
  </footer>
  <div id="cookie-consent"></div>
  <script src="js/components.js"></script>

  <script>
    const form = document.getElementById('booking-form');
    const successMessage = document.getElementById('success-message');
    const errorMessage = document.getElementById('error-message');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();

      successMessage.style.display = 'none';
      errorMessage.style.display = 'none';

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: form.method,
          body: formData,
          headers: { Accept: 'application/json' }
        });

        if (response.ok) {
          form.reset();
          successMessage.style.display = 'block';
        } else {
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
