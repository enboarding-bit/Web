<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="css/global.css">
  <style>
    .form-card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 40px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.25s ease;
    }
    .form-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: rgba(169, 207, 214, 0.5);
    }
    .form-group {
      margin-bottom: 28px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 0.95rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-family: var(--font-sans);
      font-size: 1rem;
      background: var(--surface-soft);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-soft);
    }
    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 32px;
    }
    .checkbox-group input {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: var(--brand);
    }
    .checkbox-group label {
      font-size: 0.95rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .checkbox-group a {
      color: var(--ink);
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      text-decoration-color: var(--brand-soft-3);
    }
    .checkbox-group a:hover {
      text-decoration-color: var(--brand);
    }
    .note {
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .btn-primary {
      width: 100%;
      justify-content: center;
      padding: 16px 28px;
      font-size: 1.05rem;
      border-radius: 40px;
    }
    @media (max-width: 640px) {
      .form-card {
        padding: 28px 22px;
      }
    }
  </style>
</head>
<body>
  <div id="lang-bar" style="display:none;"></div>
  <header class="header">
    <div class="header-inner" id="global-header"></div>
  </header>

  <main>
    <section class="section">
      <div class="container" style="max-width:820px;">
        <div class="section-title">
          <div class="kicker">Première séance gratuite</div>
          <h1 style="font-size:clamp(2.2rem,4vw,3.3rem);">Réservez votre première séance</h1>
          <p>Commencez par une conversation ciblée pour clarifier votre situation, vos priorités et vos prochaines étapes.</p>
        </div>
        <div class="form-card">
          <div class="form-group">
            <label for="name">Nom complet *</label>
            <input id="name" type="text" placeholder="Votre nom">
          </div>
          <div class="form-group">
            <label for="email">Adresse email *</label>
            <input id="email" type="email" placeholder="vous@exemple.com">
          </div>
          <div class="form-group">
            <label for="message">Quel est votre plus grand défi en ce moment ? (optionnel)</label>
            <textarea id="message" placeholder="Ex: Je ne sais pas comment valider mon idée, je suis bloqué entre deux directions, j'ai besoin d'une feuille de route..."></textarea>
          </div>
          <div class="checkbox-group">
            <input type="checkbox" id="consent">
            <label for="consent">J'accepte la <a href="fr_privacy.html">Politique de confidentialité</a> et consens à être contacté pour cette séance.</label>
          </div>
          <a href="mailto:contact@en-boarding.com" class="btn btn-primary">Demander ma séance gratuite →</a>
          <p class="note">Après l'envoi, vous pouvez continuer la conversation à contact@en-boarding.com.</p>
        </div>
      </div>
    </section>
  </main>

  <footer><div class="footer-inner" id="global-footer"></div></footer>
  <div id="cookie-consent"></div>

  <script src="js/components.js"></script>
</body>
</html>
